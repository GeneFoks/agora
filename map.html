<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта территории — AGORA Foundation</title>
  <meta name="description" content="Интерактивная карта 10 акров AGORA: выбери делянку, открой клетки и размести дерево, куст, курицу или улей.">
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .estate { position: relative; width: 100%; min-height: 100vh; padding: 92px 0 60px; overflow: hidden;
      background:
        radial-gradient(130% 80% at 50% -10%, rgba(150,175,120,.16), transparent 60%),
        linear-gradient(165deg, #11150f 0%, #0c100b 55%, #100d08 100%); }
    html[data-theme="light"] .estate { background: radial-gradient(130% 80% at 50% -10%, rgba(150,180,130,.4), transparent 60%), linear-gradient(165deg,#eef2e6,#f4efe3); }
    .estate-inner { max-width: 1320px; margin: 0 auto; padding: 0 24px; }

    .estate-head { text-align: center; margin-bottom: 26px; }
    .estate-head .breadcrumb { justify-content: center; margin-bottom: 10px; }
    .estate-head h1 { font-size: clamp(28px,4vw,46px); font-weight: 300; margin: 0 0 10px; }
    .estate-head p { font-size: 15px; color: var(--muted); font-weight: 300; max-width: 560px; margin: 0 auto; line-height: 1.7; }

    /* ── OVERVIEW: 10 acres → 0.25-acre parcels ── */
    .ov-board { position: relative; width: 100%; aspect-ratio: 9 / 5; margin: 0 auto; border-radius: 18px; overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,.45), inset 0 0 0 1px var(--border); background: #11150f; }
    #ovMap { position: absolute; inset: 0; z-index: 0; pointer-events: none; background: #11150f no-repeat center/100% 100%; }
    .ov-grid { position: absolute; inset: 0; z-index: 1; display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(5, 1fr); }
    .parcel { position: relative; border-right: 1px solid rgba(255,255,255,.22); border-bottom: 1px solid rgba(255,255,255,.22); cursor: pointer; transition: background .18s, box-shadow .18s; }
    .parcel:hover { background: rgba(196,137,74,.30); box-shadow: inset 0 0 0 2px rgba(244,239,226,.7); z-index: 2; }
    .parcel-id { position: absolute; top: 7px; left: 9px; font-size: 11px; letter-spacing: .08em; color: #fff; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,.85); }
    .parcel-count { position: absolute; bottom: 7px; right: 9px; font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(196,137,74,.85); color: #1a1308; font-weight: 600; display: none; }
    .parcel.has-items .parcel-count { display: block; }
    /* sellable plots (top rows) */
    .parcel.plot { box-shadow: inset 0 0 0 1px rgba(196,137,74,.5); }
    .parcel.plot.st-prepaid { background: rgba(196,137,74,.42); }
    .parcel.plot.st-booking { background: rgba(196,137,74,.24); }
    .parcel.plot.st-bought  { background: var(--earth); }
    .parcel-tag { position: absolute; top: 6px; right: 6px; font-size: 8px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; padding: 1px 5px; border-radius: 20px; background: rgba(8,7,5,.55); color: #f4efe2; }
    .parcel-owner { position: absolute; bottom: 6px; left: 7px; right: 7px; font-size: 10px; color: #fff; font-weight: 500; text-shadow: 0 1px 3px rgba(0,0,0,.9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ov-hint { text-align: center; font-size: 12.5px; color: var(--muted); margin-top: 16px; letter-spacing: .03em; }

    /* ── DETAIL modal ── */
    .detail { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px;
      background: rgba(8,7,5,.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .detail.open { display: flex; }
    .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; width: 100%; max-width: 720px;
      max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 90px rgba(0,0,0,.6); }
    .detail-top { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .detail-top h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; margin: 0; }
    .detail-top .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .detail-close { width: 34px; height: 34px; border-radius: 9px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .detail-close:hover { color: var(--earth); border-color: var(--border-earth); }
    .detail-body { padding: 20px 22px; overflow: auto; }
    .fine-wrap { position: relative; width: min(560px, 100%); margin: 0 auto;
      background: #11150f; border-radius: 12px; padding: 8px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.18); }
    .fine-grid { display: grid; gap: 0; aspect-ratio: 1; position: relative; }
    .fcell { border-right: 1px solid rgba(255,255,255,.05); border-bottom: 1px solid rgba(0,0,0,.06); cursor: pointer; position: relative; transition: background .12s; }
    .fcell:hover { background: rgba(244,239,226,.16); }
    .fcell.occupied { cursor: pointer; }
    .fcell.blocked-preview { background: rgba(220,80,60,.18); }
    .fcell svg { position: absolute; inset: 8%; width: 84%; height: 84%; pointer-events: none; filter: drop-shadow(0 1px 1.5px rgba(0,0,0,.4)); }
    /* roaming animals layer */
    .fine-animals { position: absolute; inset: 0; pointer-events: none; z-index: 4; }
    .fanim { position: absolute; aspect-ratio: 1; transform: translate(-50%,-50%); transition: left 2.5s ease-in-out, top 2.5s ease-in-out; pointer-events: auto; cursor: pointer; filter: drop-shadow(0 1px 2px rgba(0,0,0,.55)); }
    .fanim svg { width: 100%; height: 100%; display: block; }
    .fanim .bob { width: 100%; height: 100%; animation: fbob 1.7s ease-in-out infinite; }
    @keyframes fbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10%); } }
    @media (prefers-reduced-motion: reduce) { .fanim { transition: none; } .fanim .bob { animation: none; } }
    .detail-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; font-size: 13px; }
    .foot-tally { display: flex; flex-wrap: wrap; gap: 12px; color: var(--muted); }
    .foot-tally b { color: var(--text); }
    .foot-total { font-weight: 600; color: var(--earth); }

    /* ── cell purchase menu ── */
    .cellmenu { position: fixed; z-index: 300; width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,.55); padding: 8px; display: none; }
    .cellmenu.open { display: block; }
    .cellmenu-h { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 6px 8px 8px; }
    .ci { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 9px; cursor: pointer; transition: background .14s; }
    .ci:hover { background: var(--surface2); }
    .ci[aria-disabled="true"] { opacity: .38; cursor: not-allowed; }
    .ci-ico { width: 28px; height: 28px; flex-shrink: 0; }
    .ci-name { flex: 1; font-size: 13.5px; color: var(--text); }
    .ci-price { font-size: 12.5px; color: var(--earth); font-weight: 600; }
    .ci-rule { font-size: 10.5px; color: #d98; margin-top: 2px; }
    .cellmenu-rm { color: #e08a7a; }

    /* ── how-it-works + catalog ── */
    .how { padding: 18px 0 40px; }
    .how-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .how h2 { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: clamp(24px,3vw,34px); text-align: center; margin: 0 0 28px; }
    .how-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
    .how-step { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
    .how-step-n { width: 30px; height: 30px; border-radius: 50%; background: var(--earth); color: #1a1308; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 12px; }
    .how-step h4 { margin: 0 0 6px; font-size: 16px; font-weight: 500; }
    .how-step p { margin: 0; font-size: 13.5px; color: var(--muted); line-height: 1.65; font-weight: 300; }
    .how h3 { text-align: center; font-size: 18px; font-weight: 500; margin: 0 0 18px; }
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 12px; }
    .cat-card { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
    .cat-card svg { width: 38px; height: 38px; flex-shrink: 0; }
    .cat-card .nm { font-size: 14px; color: var(--text); }
    .cat-card .pr { font-size: 13px; color: var(--earth); font-weight: 600; margin-top: 2px; }
    .cat-note { margin: 22px auto 0; max-width: 720px; text-align: center; font-size: 13px; color: var(--muted); line-height: 1.7; font-weight: 300; }
    .cat-note.soon { color: var(--earth); opacity: .85; }
    @media (max-width: 700px) { .how-steps { grid-template-columns: 1fr; } }

  </style>
</head>

    </div>
  </div>
</section>

    barn:'<svg viewBox="0 0 48 48"><path d="M9 21 24 11 39 21z" fill="#7a2f26"/><rect x="12" y="21" width="24" height="18" fill="#b14a3a"/><rect x="20" y="27" width="8" height="12" fill="#e2c690"/><path d="M20 27 28 39M28 27 20 39" stroke="#7a2f26" stroke-width="2"/></svg>',
    greenhouse:'<svg viewBox="0 0 48 48"><path d="M10 22 24 12 38 22z" fill="#a7d2d8" opacity=".85"/><rect x="13" y="22" width="22" height="17" fill="#bfe2e6" opacity=".7"/><path d="M19 22V39M24 14V39M29 22V39" stroke="#7fb3bb" stroke-width="1"/></svg>',
    road:'<svg viewBox="0 0 48 48"><rect x="6" y="6" width="36" height="36" rx="6" fill="#5a7d4f" opacity=".15"/><path d="M24 5V43" stroke="#c6a86a" stroke-width="13" stroke-linecap="round"/><path d="M24 10v6M24 22v6M24 34v4" stroke="#efe0c0" stroke-width="2" stroke-linecap="round"/></svg>',
    gazebo:'<svg viewBox="0 0 48 48"><path d="M9 20 24 9 39 20z" fill="#9a6f3e"/><rect x="14" y="20" width="2.5" height="18" fill="#6f5230"/><rect x="31.5" y="20" width="2.5" height="18" fill="#6f5230"/><rect x="13" y="36" width="22" height="3" fill="#6f5230"/></svg>'
  };

  // ── State (in-memory; visual prototype) ──
  var PLACE = {};  // parcelId -> { "cx,cy": itemId }
  function pData(pid) { if (!PLACE[pid]) PLACE[pid] = {}; return PLACE[pid]; }

  // ── Sellable plots: top PLOT_ROWS rows (4 cols × 3 = 12 участков) ──
  var PLOT_ROWS = 3;
  // status: available | booking | prepaid | bought
  var PLOTS = {
    'A3': { owner: 'Геннадий',  status: 'prepaid' },
    'B3': { owner: 'Евгений',   status: 'prepaid' },
    'C3': { owner: 'Александр', status: 'booking' }
  };
  function isPlot(c, r) { return !!PLOTS[parcelId(c, r)]; }
  function statusLabel(s) {
    return RU
      ? ({ available: 'Свободно', booking: 'Бронь', prepaid: 'Предоплата', bought: 'Куплено' }[s] || s)
      : ({ available: 'Available', booking: 'Booked', prepaid: 'Prepaid', bought: 'Sold' }[s] || s);
  }

  // ── Overview ──
  var ovGrid = document.getElementById('ovGrid');
  function parcelId(c, r) { return COL_LETTERS[c] + (r + 1); }

  function buildOverview() {
    ovGrid.innerHTML = '';
    for (var r = 0; r < OV_ROWS; r++) {
      for (var c = 0; c < OV_COLS; c++) {
        var id = parcelId(c, r);
        var count = Object.keys(pData(id)).length;
        var plot = isPlot(c, r);
        var data = plot ? (PLOTS[id] || { status: 'available' }) : null;
        var div = document.createElement('div');
        var cls = 'parcel' + (count ? ' has-items' : '');
        if (plot) cls += ' plot st-' + data.status;
        div.className = cls;
        var html = '<span class="parcel-id">' + id + '</span>';
        if (plot) {
          html += '<span class="parcel-tag">' + statusLabel(data.status) + '</span>';
          if (data.owner) html += '<span class="parcel-owner">' + data.owner + '</span>';
        } else {
          html += '<span class="parcel-count">' + count + '</span>';
        }
        div.innerHTML = html;
        (function (pid) { div.addEventListener('click', function () { openParcel(pid); }); })(id);
        ovGrid.appendChild(div);
      }
    }
  }

  // ── Detail (fine grid) ──
  var detail = document.getElementById('detail');
  var fineGrid = document.getElementById('fineGrid');
  var cellMenu = document.getElementById('cellMenu');
  var curParcel = null;

  function openParcel(pid) {
    curParcel = pid;
    var c = COL_LETTERS.indexOf(pid.charAt(0));
    var r = parseInt(pid.slice(1), 10) - 1;
    var plot = isPlot(c, r);
    var pinfo = plot ? (PLOTS[pid] || { status: 'available' }) : null;
    document.getElementById('dTitle').textContent = (plot ? L('Участок ', 'Plot ') : L('Делянка ', 'Parcel ')) + pid;
    var acres = 10 / (OV_COLS * OV_ROWS);
    var side = Math.round(Math.sqrt(acres * 43560));   // ft per side of a square parcel
    var cellFt = Math.max(1, Math.round(side / FINE));
    var acreLine = '≈' + acres.toFixed(2) + (RU ? ' акра · ≈' : ' acre · ≈') + side + ' × ' + side + (RU ? ' фт' : ' ft');
    var sub;
    if (plot) {
      sub = (RU ? 'Статус: ' : 'Status: ') + statusLabel(pinfo.status)
          + (pinfo.owner ? (RU ? ' · Владелец: ' : ' · Owner: ') + pinfo.owner : '')
          + ' · ' + acreLine;
    } else {
      sub = acreLine + (RU ? ' · сетка ' : ' · ') + FINE + '×' + FINE + (RU ? ' (клетка ≈ ' + cellFt + ' фт)' : ' grid (cell ≈ ' + cellFt + ' ft)');
    }
    document.getElementById('dSub').textContent = sub;
    buildFine();
    // Show the aerial crop of this exact parcel behind the fine grid (zoom keeps the image).
    fineGrid.style.backgroundImage = "url('land-bg.png')";
    fineGrid.style.backgroundRepeat = 'no-repeat';
    fineGrid.style.backgroundSize = (OV_COLS * 100) + '% ' + (OV_ROWS * 100) + '%';
    fineGrid.style.backgroundPosition =
      (OV_COLS > 1 ? (c / (OV_COLS - 1) * 100) : 0) + '% ' +
      (OV_ROWS > 1 ? (r / (OV_ROWS - 1) * 100) : 0) + '%';
    detail.classList.add('open');
  }
  window.closeDetail = function () { animTimers.forEach(clearInterval); animTimers = []; detail.classList.remove('open'); closeMenu(); buildOverview(); };
  detail.addEventListener('click', function (e) { if (e.target === detail) window.closeDetail(); });

  // ── connectable tiles: roads + buildings merge with same-kind neighbours ──
  var CONNECT = { road:1, house:1, banya:1, barn:1, greenhouse:1, gazebo:1 };
  var TILE = {
    house:      { fill:'#c08a55',             edge:'#8a5a2c' },
    banya:      { fill:'#8a6a3e',             edge:'#5a4226' },
    barn:       { fill:'#b14a3a',             edge:'#7a2f26' },
    greenhouse: { fill:'rgba(160,205,210,.78)', edge:'#6f9aa0' },
    gazebo:     { fill:'#9a6f3e',             edge:'#6f5230' }
  };
  function roadTileHTML(n, e, s, w) {
    var c = '#c6a86a', p = '<rect x="3.4" y="3.4" width="5.2" height="5.2" rx="1.4" fill="' + c + '"/>';
    if (n) p += '<rect x="3.4" y="0" width="5.2" height="5" fill="' + c + '"/>';
    if (s) p += '<rect x="3.4" y="7" width="5.2" height="5" fill="' + c + '"/>';
    if (e) p += '<rect x="7" y="3.4" width="5" height="5.2" fill="' + c + '"/>';
    if (w) p += '<rect x="0" y="3.4" width="5" height="5.2" fill="' + c + '"/>';
    return '<svg viewBox="0 0 12 12" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">' + p + '</svg>';
  }
  function buildTileHTML(kind, n, e, s, w, anchor) {
    var t = TILE[kind], sh = [];
    if (!n) sh.push('inset 0 2px 0 ' + t.edge);
    if (!s) sh.push('inset 0 -2px 0 ' + t.edge);
    if (!e) sh.push('inset -2px 0 0 ' + t.edge);
    if (!w) sh.push('inset 2px 0 0 ' + t.edge);
    var base = 'position:absolute;inset:0;background:' + t.fill + ';' + (sh.length ? 'box-shadow:' + sh.join(',') + ';' : '');
    var roof = 'position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(0,0,0,.14));';
    var h = '<div style="' + base + '"></div><div style="' + roof + '"></div>';
    if (anchor) h += '<div style="position:absolute;inset:12%;pointer-events:none">' + ICON[kind] + '</div>';
    return h;
  }

  function buildFine() {
    animTimers.forEach(clearInterval); animTimers = [];
    fineGrid.style.gridTemplateColumns = 'repeat(' + FINE + ',1fr)';
    var data = pData(curParcel);
    var html = '';
    for (var y = 0; y < FINE; y++) {
      for (var x = 0; x < FINE; x++) {
        var id = data[x + ',' + y], inner = '', it0 = id ? item(id) : null;
        if (id) {
          if (CONNECT[id]) {
            var n = data[x + ',' + (y-1)] === id, s = data[x + ',' + (y+1)] === id,
                e = data[(x+1) + ',' + y] === id, w = data[(x-1) + ',' + y] === id;
            inner = (id === 'road') ? roadTileHTML(n, e, s, w) : buildTileHTML(id, n, e, s, w, !n && !w);
          } else if (it0 && it0.kind === 'animal') {
            inner = '';   // animals are drawn (and roam) in the overlay layer below
          } else {
            inner = ICON[id];
          }
        }
        html += '<div class="fcell' + (id ? ' occupied' : '') + '" data-x="' + x + '" data-y="' + y + '">' + inner + '</div>';
      }
    }
    fineGrid.innerHTML = html;
    Array.prototype.forEach.call(fineGrid.children, function (cell) {
      cell.addEventListener('click', function (e) { onCell(this, e); });
    });
    buildAnimals(data);
    updateTally();
  }

  // roaming animals: wander randomly within ~30 ft, clamped to the parcel (so they never leave D/E)
  function buildAnimals(data) {
    var layer = document.createElement('div');
    layer.className = 'fine-animals';
    fineGrid.appendChild(layer);
    var acres = 10 / (OV_COLS * OV_ROWS), cellFt = Math.sqrt(acres * 43560) / FINE;
    var roamR = Math.max(1, Math.round(30 / cellFt));
    function clampC(v) { return Math.max(0, Math.min(FINE - 1, v)); }
    Object.keys(data).forEach(function (k) {
      var id = data[k], it = item(id);
      if (!it || it.kind !== 'animal') return;
      var pp = k.split(','), ax = +pp[0], ay = +pp[1];
      var el = document.createElement('div');
      el.className = 'fanim';
      el.style.width = (160 / FINE) + '%';
      el.innerHTML = '<div class="bob">' + ICON[id] + '</div>';
      el.addEventListener('click', function (ev) { ev.stopPropagation(); showInfoMenu(id, ax, ay, ev); });
      layer.appendChild(el);
      function pos(cx, cy) { el.style.left = ((cx + 0.5) / FINE * 100) + '%'; el.style.top = ((cy + 0.5) / FINE * 100) + '%'; }
      pos(ax, ay);
      if (reducedMotion) return;
      function step() { pos(clampC(ax + Math.round((Math.random()*2 - 1) * roamR)), clampC(ay + Math.round((Math.random()*2 - 1) * roamR))); }
      animTimers.push(setInterval(step, 2400 + Math.random() * 2200));
      setTimeout(step, Math.random() * 1400);
    });
  }

  function hasTreeNear(data, x, y, radius) {
    for (var dy = -radius; dy <= radius; dy++) {
      for (var dx = -radius; dx <= radius; dx++) {
        var id = data[(x + dx) + ',' + (y + dy)];
        if (id && item(id).kind === 'tree') return true;
      }
    }
    return false;
  }

  function canPlace(data, it, x, y) {
    if (data[x + ',' + y]) return L('Клетка занята', 'Cell is taken');
    if (it.kind === 'animal' && !animalAllowedHere()) return L('Животных — только в зоне D–E', 'Animals — only in zone D–E');
    if (it.kind === 'tree') {
      // a new tree may not sit next to another tree within max(itsRadius, otherTreeRadius=1)
      if (hasTreeNear(data, x, y, Math.max(it.radius, 1))) return L('Рядом уже есть дерево', 'A tree is already nearby');
    }
    return null; // ok
  }

  function onCell(cell, e) {
    var x = +cell.getAttribute('data-x'), y = +cell.getAttribute('data-y');
    var existing = pData(curParcel)[x + ',' + y];
    if (existing) { showInfoMenu(existing, x, y, e); }   // anyone can inspect
    else if (isAdmin) { showBuyMenu(x, y, e); }          // only admin can place
  }

  // persist a placement / removal to Supabase (admin only; RLS also enforces)
  function saveObject(parcel, x, y, kind) {
    if (!sb || !isAdmin) return;
    sb.from('map_objects').insert({ parcel: parcel, cx: x, cy: y, kind: kind })
      .then(function (r) { if (r.error) console.warn('save', r.error.message); });
  }
  function deleteObject(parcel, x, y) {
    if (!sb || !isAdmin) return;
    sb.from('map_objects').delete().match({ parcel: parcel, cx: x, cy: y })
      .then(function (r) { if (r.error) console.warn('del', r.error.message); });
  }

  function positionMenu(e) {
    cellMenu.classList.add('open');
    var w = cellMenu.offsetWidth, h = cellMenu.offsetHeight;
    var px = Math.min(e.clientX + 8, window.innerWidth - w - 12);
    var py = Math.min(e.clientY + 8, window.innerHeight - h - 12);
    cellMenu.style.left = Math.max(12, px) + 'px';
    cellMenu.style.top = Math.max(12, py) + 'px';
  }
  function closeMenu() { cellMenu.classList.remove('open'); }
  document.addEventListener('click', function (e) {
    if (cellMenu.classList.contains('open') && !cellMenu.contains(e.target) && !e.target.closest('.fcell')) closeMenu();
  });

  function showBuyMenu(x, y, e) {
    var data = pData(curParcel);
    var html = '<div class="cellmenu-h">' + L('Что разместить', 'Place an object') + '</div>';
    ITEMS.forEach(function (it) {
      var reason = canPlace(data, it, x, y);
      html += '<div class="ci" ' + (reason ? 'aria-disabled="true"' : 'data-buy="' + it.id + '"') + '>' +
        '<span class="ci-ico">' + ICON[it.id] + '</span>' +
        '<span><span class="ci-name">' + (RU ? it.ru : it.en) + '</span>' + (reason ? '<div class="ci-rule">' + reason + '</div>' : '') + '</span>' +
        '<span class="ci-price">' + (it.price ? '$' + it.price : '') + '</span></div>';
    });
    cellMenu.innerHTML = html;
    Array.prototype.forEach.call(cellMenu.querySelectorAll('[data-buy]'), function (row) {
      row.addEventListener('click', function () {
        var kind = this.getAttribute('data-buy');
        data[x + ',' + y] = kind;
        saveObject(curParcel, x, y, kind);
        closeMenu(); buildFine();
      });
    });
    positionMenu(e);
  }

  function showInfoMenu(id, x, y, e) {
    var it = item(id);
    var html = '<div class="cellmenu-h">' + (RU ? it.ru : it.en) + (it.price ? ' · $' + it.price : '') + '</div>';
    if (isAdmin) {
      html += '<div class="ci" data-rm="1"><span class="ci-ico">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="#e08a7a" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>' +
        '</span><span class="ci-name cellmenu-rm">' + L('Убрать', 'Remove') + '</span></div>';
    }
    cellMenu.innerHTML = html;
    var rm = cellMenu.querySelector('[data-rm]');
    if (rm) rm.addEventListener('click', function () {
      delete pData(curParcel)[x + ',' + y];
      deleteObject(curParcel, x, y);
      closeMenu(); buildFine();
    });
    positionMenu(e);
  }

  function updateTally() {
    var data = pData(curParcel), counts = {}, total = 0;
    Object.keys(data).forEach(function (k) { var id = data[k]; counts[id] = (counts[id]||0) + 1; total += item(id).price; });
    var parts = ITEMS.filter(function (it) { return counts[it.id]; })
      .map(function (it) { return '<span><b>' + counts[it.id] + '</b> ' + (RU ? it.ru : it.en) + '</span>'; });
    document.getElementById('dTally').innerHTML = parts.length ? parts.join('') : '<span>' + L('Пусто — кликни клетку, чтобы разместить объект', 'Empty — click a cell to place an object') + '</span>';
    document.getElementById('dTotal').textContent = total ? L('Итого: $', 'Total: $') + total : '';
  }

  // ── texts that depend on language ──
  function renderHow() {
    var steps = [
      [L('Выбери делянку', 'Pick a parcel'), L('10 акров поделены на делянки по 0.25 акра. Нажми на любую свободную.', '10 acres are split into 0.25-acre parcels. Click any free one.')],
      [L('Открой её сетку', 'Open its grid'), L('Внутри делянки — мелкая сетка. Нажми на свободную клетку, чтобы выбрать место.', 'Inside the parcel is a fine grid. Click a free cell to choose a spot.')],
      [L('Размести и поддержи', 'Place & support'), L('Выбери дерево, куст, цветы или животное. Каждый объект — твой живой вклад в землю Агоры.', 'Choose a tree, shrub, flowers or an animal. Each one is your living contribution to AGORA\'s land.')]
    ];
    var html = '<h2>' + L('Как устроена карта', 'How the map works') + '</h2><div class="how-steps">';
    steps.forEach(function (s, i) { html += '<div class="how-step"><div class="how-step-n">' + (i+1) + '</div><h4>' + s[0] + '</h4><p>' + s[1] + '</p></div>'; });
    html += '</div><h3>' + L('Что можно разместить', 'What you can place') + '</h3><div class="cat-grid">';
    ITEMS.forEach(function (it) {
      html += '<div class="cat-card">' + ICON[it.id] + '<div><div class="nm">' + (RU ? it.ru : it.en) + '</div><div class="pr">' + (it.price ? '$' + it.price : '') + '</div></div></div>';
    });
    html += '</div>';
    html += '<p class="cat-note">' + L(
      'Большое дерево (яблоня, апельсин) занимает место: рядом нельзя посадить ещё одно дерево, но можно куст, цветы, курицу, зайца или улей. Сейчас это превью — выбор и цены предварительные, оплата появится позже.',
      'A large tree (apple, orange) takes space: you can\'t plant another tree right next to it, but a shrub, flowers, hen, rabbit or beehive are fine. This is a preview — selection and prices are provisional; payment will come later.') + '</p>';
    html += '<p class="cat-note soon">' + L(
      '📹 Скоро: к клеткам привяжем живое видео с камер по периметру — будешь видеть свой уголок земли в реальном времени.',
      '📹 Coming soon: cells will link to live video from perimeter cameras — watch your corner of the land in real time.') + '</p>';
    document.getElementById('howInner').innerHTML = html;
  }

  function applyTexts() {
    document.getElementById('estateSub').textContent = L(
      '10 акров поделены на делянки по 0.25 акра. Выбери делянку, открой её клетки и размести дерево, куст, курицу или улей.',
      '10 acres split into 0.25-acre parcels. Pick a parcel, open its cells, and place a tree, shrub, hen or beehive.');
    document.getElementById('ovHint').textContent = L('Нажми на делянку, чтобы открыть её сетку →', 'Click a parcel to open its grid →');
    renderHow();
  }

  // ── satellite background (Esri World Imagery) ──
  function initSatellite() {
    var el = document.getElementById('ovMap');
    if (!el || el._leaflet_id) return;                 // missing or already initialized
    if (typeof L === 'undefined') { setTimeout(initSatellite, 100); return; }  // wait for Leaflet
    var map = L.map(el, {
      zoomControl: false, attributionControl: true,
      dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
      boxZoom: false, keyboard: false, touchZoom: false, tap: false
    }).setView([29.98815, -97.61940], 17);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19, attribution: 'Imagery © Esri'
    }).addTo(map);
    setTimeout(function () { map.invalidateSize(); }, 200);
    window.addEventListener('resize', function () { map.invalidateSize(); });
  }

  // ── admin detection + load placed objects from Supabase ──
  function showAdminBadge() {
    if (document.getElementById('adminBadge')) return;
    var b = document.createElement('div');
    b.id = 'adminBadge';
    b.textContent = RU
      ? '✏️ Режим администратора — открой делянку и кликай по клеткам, чтобы размещать объекты'
      : '✏️ Admin mode — open a parcel and click cells to place objects';
    b.style.cssText = 'position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:120;background:var(--earth);color:#1a1308;font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;box-shadow:0 8px 22px rgba(0,0,0,.35);max-width:92vw;text-align:center';
    document.body.appendChild(b);
  }
  function initData() {
    if (!sb) return;
    sb.auth.getUser().then(function (u) {
      var user = u && u.data ? u.data.user : null;
      if (!user) return;
      sb.from('profiles').select('is_admin').eq('id', user.id).single().then(function (pr) {
        isAdmin = !!(pr.data && pr.data.is_admin);
        if (isAdmin) showAdminBadge();
      });
    });
    sb.from('map_objects').select('parcel,cx,cy,kind').then(function (res) {
      if (res.error || !res.data) return;
      PLACE = {};
      res.data.forEach(function (o) { pData(o.parcel)[o.cx + ',' + o.cy] = o.kind; });
      buildOverview();
      if (detail.classList.contains('open')) buildFine();
    });
  }

  // ── init ──
  applyTexts();
  buildOverview();
  initData();
  // satellite is initialized by the standalone block below

  // Re-render all JS-built text whenever the language changes (robust against
  // setLang wrapper ordering between shared.js and this page).
  var lastLang = lang();
  function onLangMaybeChanged() {
    var cur = lang();
    if (cur === lastLang) return;
    lastLang = cur; RU = (cur !== 'en');
    applyTexts(); buildOverview();
    if (detail.classList.contains('open')) openParcel(curParcel);
  }
  setInterval(onLangMaybeChanged, 250);
})();
</script>

<!-- Standalone map-background initializer (independent of the main script) -->
<!-- Uses a static aerial photo (land-bg.png) if present; otherwise falls back to live Esri satellite tiles. -->
<script>
(function initEstateBg() {
  var el = document.getElementById('ovMap');
  if (!el) { return setTimeout(initEstateBg, 100); }
  if (el.dataset.bgDone) return;

  function useLeaflet() {
    if (typeof L === 'undefined') { return setTimeout(useLeaflet, 100); }
    if (el._leaflet_id) return;
    var map = L.map(el, {
      zoomControl: false, attributionControl: true,
      dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
      boxZoom: false, keyboard: false, touchZoom: false, tap: false
    }).setView([29.98815, -97.61940], 17);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19, attribution: 'Imagery © Esri'
    }).addTo(map);
    window.__agoraMap = map;
    setTimeout(function () { map.invalidateSize(); }, 250);
    window.addEventListener('resize', function () { map.invalidateSize(); });
  }

  // Prefer the project's own aerial photo if it exists.
  var img = new Image();
  img.onload = function () {
    el.dataset.bgDone = '1';
    el.style.backgroundImage = "url('land-bg.png')";
    el.style.backgroundSize = '100% 100%';
    el.style.backgroundPosition = 'center';
    el.style.backgroundRepeat = 'no-repeat';
  };
  img.onerror = function () {
    el.dataset.bgDone = '1';
    useLeaflet();
  };
  img.src = 'land-bg.png';
})();
</script>
